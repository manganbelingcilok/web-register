<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Juggernaut Roleplay</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0a0a0a;
            background-image: radial-gradient(circle at center, #161616 0%, #050505 100%);
            color: #dddddd;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .register-box {
            background-color: #111111; border: 1px solid #bba17a;
            padding: 45px 40px; width: 100%; max-width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9); text-align: center; position: relative;
        }
        .register-box::before, .register-box::after {
            content: ''; position: absolute; left: 15px; right: 15px; height: 1px;
            background: linear-gradient(90deg, transparent, #bba17a, transparent);
        }
        .register-box::before { top: 12px; } .register-box::after { bottom: 12px; }
        h1 { font-family: 'Cinzel', serif; font-size: 26px; color: #bba17a; letter-spacing: 4px; margin-bottom: 6px; text-transform: uppercase; }
        .subtitle { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; color: #777777; margin-bottom: 35px; }
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #bba17a; margin-bottom: 8px; font-weight: 600; }
        input {
            width: 100%; padding: 14px 16px; background-color: #161616; border: 1px solid #2a2a2a;
            color: #ffffff; font-family: 'Montserrat', sans-serif; font-size: 14px; transition: all 0.3s ease;
        }
        input:focus { outline: none; border-color: #bba17a; background-color: #1c1c1c; box-shadow: 0 0 10px rgba(187, 161, 122, 0.15); }
        .btn-submit {
            width: 100%; padding: 15px; background-color: #bba17a; border: none; color: #0a0a0a;
            font-family: 'Cinzel', serif; font-size: 13px; font-weight: 800; letter-spacing: 2px;
            cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: all 0.3s ease;
        }
        .btn-submit:hover { background-color: #d5bd99; box-shadow: 0 5px 20px rgba(187, 161, 122, 0.3); }
        .error-box { background-color: rgba(217, 83, 79, 0.08); border: 1px solid #d9534f; color: #d9534f; padding: 12px; font-size: 12px; margin-bottom: 25px; text-align: left; }
    </style>
</head>
<body>
    <div class="register-box">
        <h1>UCP Register</h1>
        <p class="subtitle">Create Your Character Account</p>
        {% if error_msg %}<div class="error-box">{{ error_msg }}</div>{% endif %}
        <form action="/" method="POST" autocomplete="off">
            <div class="input-group">
                <label for="ucp_name">Nama Akun UCP</label>
                <input type="text" id="ucp_name" name="ucp_name" placeholder="Contoh: Alex_Coldwell" required>
            </div>
            <div class="input-group">
                <label for="password">Password Akun</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-submit">Daftar Akun</button>
        </form>
    </div>
</body>
</html>
